name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-26:
    strategy:
      matrix:
        config:
          - debug
          - release
        xcode:
          - '26.5'
    name: macOS 26
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v5
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
    - name: Run tests
      run: swift test -c ${{ matrix.config }}

  library-evolution:
    name: Library evolution
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v5
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_26.5.app
    - name: Run tests
      run: make build-for-library-evolution

  examples:
    strategy:
      matrix:
        config:
          - Debug
          - Release
        xcode:
          - '26.5'
    name: Examples
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v5
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
    - name: Run tests
      run: make CONFIG=${{ matrix.config }} test-examples

  linux:
    strategy:
      matrix:
        config:
          - debug
          - release
    name: Linux
    runs-on: ubuntu-latest
    container: swift:6.3
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: apt-get update && apt-get install -y build-essential libcurl4-openssl-dev
      - name: Run tests
        run: swift test -c ${{ matrix.config }}
      - name: Build for static-stdlib
        run: make CONFIG=${{ matrix.config }} build-for-static-stdlib

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: skiptools/swift-android-action@v2
        with:
          free-disk-space: true
